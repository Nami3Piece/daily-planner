*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.nav{position:sticky;top:0;z-index:100;background:rgba(242,242,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--border);padding:12px 16px 8px}
.nav-title{font-size:17px;font-weight:600;text-align:center}
.nav-sub{font-size:12px;color:var(--sub);text-align:center;margin-top:2px}
.now-wrap{padding:14px 16px 0}
.now-card{border-radius:18px;padding:18px;color:#fff;position:relative;overflow:hidden}
.now-label{font-size:11px;font-weight:600;opacity:.8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.now-title{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:8px}
.now-next{font-size:13px;opacity:.8;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-bar-bg{height:5px;background:rgba(255,255,255,.3);border-radius:3px}
.now-bar{height:5px;background:#fff;border-radius:3px;transition:width .5s}
.now-time{position:absolute;top:18px;right:18px;font-size:28px;font-weight:300;opacity:.9}
.tabs{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:14px;font-weight:500;border:.5px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;transition:.15s}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.section{padding:14px 16px 0}
.sec-title{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.tl{display:flex;flex-direction:column;gap:2px}
.tl-row{display:flex;gap:10px;align-items:stretch}
.tl-left{display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0}
.tl-time{font-size:11px;color:var(--hint);white-space:nowrap;padding-top:10px}
.tl-line{flex:1;width:1.5px;background:var(--border);margin-top:3px}
.tl-line.active{background:var(--blue)}
.tl-card{flex:1;border-radius:12px;padding:10px 12px;margin-bottom:2px;border:.5px solid var(--border);background:var(--card)}
.tl-card.active{border-width:1.5px}
.tl-card.done{opacity:.5}
.tl-top{display:flex;justify-content:space-between;align-items:flex-start}
.tl-name{font-size:14px;font-weight:500;line-height:1.3;flex:1}
.tl-dur{font-size:11px;color:var(--hint);margin-left:6px;margin-top:2px;white-space:nowrap}

.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.badge-active{background:var(--blue);color:#fff}
.badge-done{background:#e5e5ea;color:var(--sub)}
.tl-detail{font-size:12px;color:var(--sub);margin-top:7px;line-height:1.8;background:var(--bg);border-radius:8px;padding:8px 10px}
.tl-expand{font-size:11px;color:var(--blue);margin-top:4px;cursor:pointer}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meal-card{background:var(--card);border-radius:14px;padding:12px 14px;border:.5px solid var(--border)}
.meal-card.wide{grid-column:1/-1}
.meal-icon{font-size:22px;margin-bottom:4px}
.meal-time{font-size:10px;color:var(--hint);font-weight:600;letter-spacing:.3px}
.meal-name{font-size:13px;font-weight:600;margin:3px 0;color:var(--text)}
.meal-cal{font-size:11px;font-weight:600;margin-bottom:6px}
.meal-items{font-size:12px;color:var(--sub);line-height:1.8}
.day-wrap{display:flex;gap:6px;overflow-x:auto;padding:4px 2px;scrollbar-width:none}
.day-wrap::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;width:42px;height:54px;border-radius:12px;border:.5px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--sub);font-weight:500;position:relative}
.day-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.day-btn .d-num{font-size:17px;font-weight:700;line-height:1}
.day-btn .d-wk{font-size:9px;margin-top:2px}
.dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--pink)}
.mtg-pill{display:inline-flex;align-items:center;gap:5px;background:#f0f0ff;border:.5px solid #b3b3f0;color:#4a4ab8;font-size:12px;font-weight:500;padding:6px 12px;border-radius:10px;margin-bottom:6px;width:100%}
.mtg-pill.conflict{background:#fff5e6;border-color:#ffcc80;color:#b35c00}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(242,242,247,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;padding:8px 0 20px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;font-weight:500;color:var(--hint);padding:4px 0}
.bnav-btn.on{color:var(--blue)}
.bnav-icon{font-size:22px}
.health-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.health-card{background:var(--card);border-radius:14px;padding:12px;text-align:center;border:.5px solid var(--border)}
.health-val{font-size:22px;font-weight:700}
.health-lbl{font-size:11px;color:var(--sub);margin-top:2px}
.progress-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.progress-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}

.bg-purple{background:linear-gradient(135deg,#af52de,#5856d6)}
.bg-pink{background:linear-gradient(135deg,#ff2d55,#ff6b95)}

    DAILYX_DAILY_SOPS.forEach(s=>{
      html+=`<div style="padding:8px 12px;border-bottom:.5px solid var(--border);font-size:13px">☐ <b>${s.id}</b> ${s.t}</div>`;
    });
    html+=`</div>`;

    html+=`<div class="section"><div class="sec-title">📆 本周 SOP</div>`;
    DAILYX_WEEKLY_SOPS.forEach(s=>{
      html+=`<div style="padding:8px 12px;border-bottom:.5px solid var(--border);font-size:13px">☐ <b>${s.id}</b> ${s.t}</div>`;
    });
    html+=`</div>`;

    html+=`<div class="section"><div class="sec-title">🗓 14 天日历</div>`;
    const byDay={};
    DAILYX_14D.forEach(x=>{(byDay[x.d]=byDay[x.d]||[]).push(x);});
    Object.keys(byDay).forEach(d=>{
      const items=byDay[d];
      const dayInt=parseInt(d);
      const isToday=dayInt===dayN;
      const bg=isToday?"background:rgba(0,122,255,0.12);border:1px solid #007aff":"background:var(--card);border:.5px solid var(--border)";
      html+=`<div style="padding:10px 12px;margin-bottom:6px;border-radius:8px;${bg}"><div style="font-size:12px;font-weight:600">D${d} · ${items[0].date} ${items[0].weekday}${isToday?' ← 今天':''}</div>`;
      items.forEach(x=>{
        const se={done:"✅",queued:"📝",pending:"⏳"}[x.status]||"⏳";
        html+=`<div style="font-size:12px;color:var(--sub);margin-top:3px">${se} ${x.sgt} ${x.lang} · ${x.topic}</div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;

    html+=`<div class="section"><div class="sec-title">🎯 关键节点</div>`;
    DAILYX_MILESTONES.forEach(m=>{
      html+=`<div class="mtg-pill">📍 <b>${m.date}</b> ${m.label}</div>`;
    });
    html+=`</div>`;
  }

  document.getElementById("app").innerHTML=html;
}

function mc(icon,name,time,items,cal,cls,wide=false){
  return `<div class="meal-card${wide?" wide":""}">
    <div class="meal-icon">${icon}</div>
    <div class="meal-time">${time}</div>
    <div class="meal-name">${name}</div>
    <div class="meal-cal ${cls}">${cal} kcal</div>
    <div class="meal-items">${items}</div>
  </div>`;
}
function pr(label,cur,target,color,pct){
  return `<div style="margin-bottom:12px">
    <div class="progress-row"><span>${label}</span><span style="color:var(--sub);font-size:12px">${cur} / ${target}</span></div>
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}
function tb(label,val,color,pct){
  return `<div style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span>${label}</span><span style="color:var(--sub)">${val}·${pct}%</span>
    </div>
    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}
function tip(icon,title,desc){
  return `<div style="display:flex;gap:10px;margin-bottom:8px;font-size:13px;line-height:1.6">
    <span>${icon}</span><div><b>${title}</b> <span style="color:var(--sub)">${desc}</span></div>
  </div>`;
}
function toggle(id){expanded.has(id)?expanded.delete(id):expanded.add(id);render();}
function setView(v){
  view=v;
  ["today","meals","plan","health","dailyx"].forEach(x=>{
    document.getElementById("btn-"+x).classList.toggle("on",x===v);
  });
  render();
}
function setDay(d){planDay=d;render();}

clearInterval(ticker);
ticker=setInterval(render,30000);
render();
</script>
</body>
</html>
